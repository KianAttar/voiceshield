<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M512 160
    C512 160 320 220 240 240
    C240 240 230 560 280 680
    C330 800 512 880 512 880
    C512 880 694 800 744 680
    C794 560 784 240 784 240
    C704 220 512 160 512 160Z"
    fill="url(#shield)" opacity="0.95"/>

  <!-- Sound waves (3 arcs) -->
  <g fill="none" stroke="#4f46e5" stroke-width="36" stroke-linecap="round">
    <!-- Inner wave -->
    <path d="M460 440 C460 440 440 480 440 520 C440 560 460 600 460 600"/>
    <!-- Middle wave -->
    <path d="M410 380 C410 380 375 440 375 520 C375 600 410 660 410 660"/>
    <!-- Outer wave -->
    <path d="M360 320 C360 320 310 400 310 520 C310 640 360 720 360 720"/>
  </g>

  <!-- Microphone body -->
  <rect x="530" y="380" width="100" height="180" rx="50" fill="#4f46e5"/>

  <!-- Microphone base arc -->
  <path d="M510 540 C510 620 560 660 580 660 C600 660 650 620 650 540"
    fill="none" stroke="#4f46e5" stroke-width="30" stroke-linecap="round"/>

  <!-- Microphone stand -->
  <line x1="580" y1="660" x2="580" y2="730" stroke="#4f46e5" stroke-width="30" stroke-linecap="round"/>
  <line x1="540" y1="730" x2="620" y2="730" stroke="#4f46e5" stroke-width="30" stroke-linecap="round"/>
</svg>
